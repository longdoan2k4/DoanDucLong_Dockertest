name: CI/CD Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Robot này sẽ gọi Dockerfile ở trên để tự Build và Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bai-tap-spring-boot:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="doanduclong1744/bai-tap-spring-boot"
          CONTAINER_PORT=8080 # Spring Boot mặc định chạy 8080, hãy khớp với EXPOSE
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại."
            exit 1
          fi
          echo "Deploy thành công."